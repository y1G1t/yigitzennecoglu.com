<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gallery — Yiğit Zennecioğlu</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .page-header { padding: 60px 60px 48px; border-bottom: 0.5px solid var(--bg-line); }
    .page-tag { font-size: 11px; letter-spacing: 4px; text-transform: uppercase; color: var(--gold); margin-bottom: 16px; }
    .page-title { font-family: var(--font-serif); font-size: 48px; font-weight: 700; color: var(--text-primary); margin: 0 0 12px; }
    .page-desc { font-size: 14px; color: var(--text-muted); line-height: 1.7; max-width: 520px; margin-top: 12px; }
    .gallery-section { padding: 48px 60px; }
    .gallery-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px; background: var(--bg-line); }
    .gallery-item { background: var(--bg-card); aspect-ratio: 1; position: relative; overflow: hidden; cursor: pointer; }
    .gallery-item img { width: 100%; height: 100%; object-fit: cover; display: block; opacity: 0.85; transition: opacity 0.3s; }
    .gallery-item:hover img { opacity: 1; }
    .gallery-item-placeholder { width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; }
    .placeholder-icon { width: 32px; height: 32px; border: 0.5px solid #2a2a2a; display: flex; align-items: center; justify-content: center; }
    .placeholder-icon svg { width: 14px; height: 14px; stroke: #333; fill: none; }
    .placeholder-label { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: #2a2a2a; }
    .gallery-item-overlay { position: absolute; inset: 0; background: rgba(10,10,10,0.6); opacity: 0; transition: opacity 0.3s; display: flex; align-items: flex-end; padding: 20px; }
    .gallery-item:hover .gallery-item-overlay { opacity: 1; }
    .overlay-caption { font-size: 12px; color: #e8e0d0; line-height: 1.4; }
    .overlay-tag { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--gold); display: block; margin-bottom: 4px; }

    /* Lightbox */
    .lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: 999; align-items: center; justify-content: center; }
    .lightbox.open { display: flex; }
    .lightbox img { max-width: 80vw; max-height: 80vh; object-fit: contain; }
    .lightbox-close { position: fixed; top: 32px; right: 40px; font-size: 24px; color: #555; cursor: pointer; background: none; border: none; line-height: 1; }
    .lightbox-close:hover { color: var(--gold); }

    .how-to-add { background: var(--bg-card); border: 0.5px solid var(--bg-line); border-left: 2px solid var(--gold-dim); padding: 28px 32px; margin: 0 60px 48px; }
    .how-to-add h3 { font-size: 11px; letter-spacing: 3px; text-transform: uppercase; color: #333; margin-bottom: 12px; }
    .how-to-add p { font-size: 13px; color: #333; line-height: 1.7; margin: 0; }
    .how-to-add code { font-family: monospace; font-size: 12px; background: #111; padding: 2px 6px; color: #666; }
  </style>
</head>
<body>
  <nav class="site-nav">
    <a href="index.html" class="site-logo">YZ</a>
    <div class="nav-links">
      <a href="about.html">About</a>
      <a href="portfolio.html">Portfolio</a>
      <a href="blog.html">Blog</a>
      <a href="gallery.html" class="active">Gallery</a>
      <a href="contact.html">Contact</a>
    </div>
  </nav>

  <div class="page-header">
    <p class="page-tag">Visual</p>
    <h1 class="page-title">Gallery</h1>
    <p class="page-desc">A visual record — places, moments, and things worth remembering.</p>
  </div>

  <section class="gallery-section">
    <div class="section-label" style="margin-bottom:32px;">Photos</div>

    <div class="gallery-grid">

      <!-- ✏️ FOTOĞRAF EKLEMEK İÇİN:
           1. Fotoğrafınızı site klasörüne koyun (örn: images/foto1.jpg)
           2. Aşağıdaki satırı kopyalayın ve img src'yi güncelleyin
           3. caption ve tag'i düzenleyin

  <div class="gallery-item" onclick="openLightbox(this)">
  <img src="gallery/gallery-1.jpg" alt="CAR" 
       data-caption="Istanbul, April 2026" 
       data-tag="Car" />
  <div class="gallery-item-overlay">
    <div class="overlay-caption">
      <span class="overlay-tag">Car</span>
      Istanbul, April 2026
    </div>
  </div>
</div>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox" onclick="closeLightbox()">
    <button class="lightbox-close" onclick="closeLightbox()">✕</button>
    <img id="lightbox-img" src="" alt="" />
  </div>

  <footer class="site-footer">
    <div class="footer-copy">© 2026 Yiğit Zennecioğlu — yigitzennecoglu.com</div>
    <div class="footer-social">
      <a href="https://instagram.com/ygtzenn" target="_blank">Instagram</a>
      <a href="https://www.linkedin.com/in/yi%C4%9Fit-zennecio%C4%9Flu-aa84a6198/" target="_blank">LinkedIn</a>
      <a href="https://www.youtube.com/@YEZE088" target="_blank">YouTube</a>
    </div>
  </footer>

  <script>
    function openLightbox(el) {
      const img = el.querySelector('img');
      if (!img) return;
      document.getElementById('lightbox-img').src = img.src;
      document.getElementById('lightbox').classList.add('open');
    }
    function closeLightbox() {
      document.getElementById('lightbox').classList.remove('open');
    }
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });
  </script>
</body>
</html>
